sites:
  - id: ${FLEET_SITE_ID}
    description: ${FLEET_SITE_DESCRIPTION}
    network:
      tailnet: ${FLEET_TAILNET_NAME}
      flannelInterface: ${FLEET_FLANNEL_INTERFACE}
nodes:
  - id: ${FLEET_CONTROL_PLANE_NODE_ID}
    site: ${FLEET_SITE_ID}
    system: ${FLEET_CONTROL_PLANE_SYSTEM}
    roles:
      - k3s-control-plane
    capabilities:
      - public-ingress
  - id: ${FLEET_WORKER_NODE_ID}
    site: ${FLEET_SITE_ID}
    system: ${FLEET_WORKER_SYSTEM}
    roles:
      - k3s-worker
      - raspberry-pi-image
rendererTargets:
  flake:
    enabled: false
  deployRs:
    enabled: false
