metadata:
  name: ${VAULT_BOOTSTRAP_NAME}
  namespace: ${VAULT_BOOTSTRAP_NAMESPACE}
  vaultAddress: ${VAULT_ADDR}
  tokenSecretName: ${VAULT_BOOTSTRAP_TOKEN_SECRET_NAME}
  tokenSecretKey: ${VAULT_BOOTSTRAP_TOKEN_SECRET_KEY}
  serviceAccountName: ${VAULT_BOOTSTRAP_SERVICE_ACCOUNT_NAME}
authMounts:
  - name: kubernetes
    type: kubernetes
kvMounts:
  - name: secret
    version: 2
policies:
  - name: vso-read
    rules:
      - path: secret/data/platform/*
        capabilities:
          - read
kubernetesRoles:
  - name: vso
    mount: kubernetes
    serviceAccounts:
      - name: ${VSO_SERVICE_ACCOUNT_NAME}
        namespace: ${VSO_NAMESPACE}
    policies:
      - vso-read
    ttl: 1h
vsoSecrets:
  - name: app-static-secret
    namespace: ${APP_NAMESPACE}
    mount: secret
    path: ${APP_SECRET_VAULT_PATH}
    destinationSecretName: ${APP_SECRET_NAME}
    vaultAuthRef: vso-auth
transitKeys:
  - name: ${VAULT_TRANSIT_SIGNING_KEY_NAME}
    type: rsa-2048
databaseDynamicCredentials:
  - name: app-database
    enabled: true
    namespace: ${APP_NAMESPACE}
    mount: database
    plugin: postgresql-database-plugin
    connectionUrl: ${DATABASE_CONNECTION_URL}
    adminUsername: ${DATABASE_ADMIN_USERNAME}
    adminPassword: ${DATABASE_ADMIN_PASSWORD}
    destinationSecretName: ${DATABASE_DYNAMIC_SECRET_NAME}
    roles:
      - name: app-database
        creationStatements: ${DATABASE_CREATION_STATEMENTS}
        defaultTtl: 1h
        maxTtl: 24h
rabbitmqDynamicCredentials:
  - name: app-rabbitmq
    enabled: true
    namespace: ${APP_NAMESPACE}
    mount: rabbitmq
    connectionUri: ${RABBITMQ_CONNECTION_URI}
    adminUsername: ${RABBITMQ_ADMIN_USERNAME}
    adminPassword: ${RABBITMQ_ADMIN_PASSWORD}
    destinationSecretName: ${RABBITMQ_DYNAMIC_SECRET_NAME}
    roles:
      - name: app-rabbitmq
        vhosts: ${RABBITMQ_DYNAMIC_VHOSTS}
        tags: ${RABBITMQ_DYNAMIC_TAGS}
        configure: ${RABBITMQ_DYNAMIC_CONFIGURE}
        write: ${RABBITMQ_DYNAMIC_WRITE}
        read: ${RABBITMQ_DYNAMIC_READ}
