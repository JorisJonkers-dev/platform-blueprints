forwardAuth:
  middlewareName: ${EDGE_FORWARD_AUTH_MIDDLEWARE_NAME}
  addressRef:
    service: ${EDGE_FORWARD_AUTH_SERVICE_NAME}
    path: ${EDGE_FORWARD_AUTH_VERIFY_PATH}
  trustForwardHeader: true
  responseHeaders:
    - ${EDGE_FORWARD_AUTH_RESPONSE_HEADER_USER}
    - ${EDGE_FORWARD_AUTH_RESPONSE_HEADER_GROUPS}
securityHeaders:
  defaultProfile:
    browserXssFilter: true
    contentTypeNosniff: true
    frameDeny: true
    referrerPolicy: ${EDGE_SECURITY_REFERRER_POLICY}
cspProfiles:
  strict:
    enabled: false
    policy: ${EDGE_CSP_STRICT_POLICY}
  admin:
    enabled: false
    policy: ${EDGE_CSP_ADMIN_POLICY}
localTraefik:
  dashboard:
    enabled: false
    hostname: ${EDGE_DASHBOARD_HOSTNAME}
  certificates:
    certFile: ${EDGE_LOCAL_CERT_FILE_PATH}
    keyFile: ${EDGE_LOCAL_KEY_FILE_PATH}
