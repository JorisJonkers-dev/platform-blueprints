metadata:
  name: ${RABBITMQ_RELEASE_NAME}
  namespace: ${RABBITMQ_NAMESPACE}
oauth2:
  enabled: true
  issuerUrl: ${RABBITMQ_OAUTH2_ISSUER_URL}
  managementClientId: ${RABBITMQ_MANAGEMENT_OAUTH_CLIENT_ID}
  scopePrefix: ${RABBITMQ_OAUTH2_SCOPE_PREFIX}
  adminScopes:
    - ${RABBITMQ_OAUTH2_ADMIN_ALIAS_SCOPES}
internalCredentials:
  secretRef:
    name: ${RABBITMQ_INTERNAL_CREDENTIALS_SECRET_NAME}
    usernameKey: ${RABBITMQ_INTERNAL_USERNAME_KEY}
    passwordKey: ${RABBITMQ_INTERNAL_PASSWORD_KEY}
vaultDynamicBackend:
  enabled: false
  mount: ${RABBITMQ_DYNAMIC_MOUNT}
  connectionSecretRef:
    name: ${RABBITMQ_DYNAMIC_CONNECTION_SECRET_NAME}
plugins:
  - ${RABBITMQ_PLUGIN_MANAGEMENT}
  - ${RABBITMQ_PLUGIN_PROMETHEUS}
  - ${RABBITMQ_PLUGIN_OAUTH2}
serviceMonitor:
  enabled: true
storage:
  size: ${RABBITMQ_STORAGE_SIZE}
  storageClassName: ${RABBITMQ_STORAGE_CLASS}
placement:
  nodeSelector:
    ${RABBITMQ_NODE_SELECTOR_KEY}: ${RABBITMQ_NODE_SELECTOR_VALUE}
