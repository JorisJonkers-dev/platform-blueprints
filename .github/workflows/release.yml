name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # This repo is consumed by version tag/ref, not a package registry.
      # Consumers check out the tag and pass that checkout as an explicit
      # blueprints root to deploy-config-schema.
      - name: Publish release tag reference
        shell: bash
        run: echo "Release tag ${{ needs.release-please.outputs.tag_name }} is available for consumers."
