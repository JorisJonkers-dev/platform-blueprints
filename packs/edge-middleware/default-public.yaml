apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: "${EDGE_DEFAULT_PUBLIC_CHAIN_MIDDLEWARE_NAME}"
  namespace: "${EDGE_MIDDLEWARE_NAMESPACE}"
spec:
  chain:
    middlewares:
      - name: "${EDGE_FORWARD_AUTH_MIDDLEWARE_NAME}"
      - name: "${EDGE_SECURITY_HEADERS_MIDDLEWARE_NAME}"
      - name: "${EDGE_CSP_STRICT_MIDDLEWARE_NAME}"
