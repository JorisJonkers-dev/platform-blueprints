apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: "${GATEWAY_API_PUBLIC_GATEWAY_NAME}"
  namespace: "${GATEWAY_API_PUBLIC_NAMESPACE}"
  labels:
    platform.jorisjonkers.dev/channel: public
spec:
  gatewayClassName: "${GATEWAY_API_CLASS_NAME}"
  listeners:
    - name: https
      hostname: "${GATEWAY_API_PUBLIC_HOSTNAME}"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: "${GATEWAY_API_PUBLIC_TLS_SECRET_NAME}"
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              platform.jorisjonkers.dev/public-routes: "true"
